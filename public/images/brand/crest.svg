  <path d="M320,403 C340,342 390,310 440,318 C480,322 515,345 540,375 L480,402 Z" fill="#D4AF37"/>
  <path d="M320,403 C340,342 390,310 440,318 C480,322 515,345 540,375 L480,402 Z" fill="none" stroke="rgba(5,5,5,0.4)" stroke-width="4"/>

