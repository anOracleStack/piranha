  <path d="
    M200,620
    C185,570 188,510 210,470
    C235,428 278,410 330,402
    C380,394 430,398 475,410
    C520,422 558,444 578,474
    C598,504 600,540 590,574
    C580,608 556,638 522,656
    C488,674 446,680 400,678
    C354,676 308,664 270,644
    C232,624 215,670 200,620 Z"
    fill="#D4AF37"
  />

