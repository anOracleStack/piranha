    <path d="M280,490 A28,18 0 0,0 336,490"/>
    <path d="M336,490 A28,18 0 0,0 392,490"/>
    <path d="M392,490 A28,18 0 0,0 448,490"/>
    <path d="M448,490 A28,18 0 0,0 504,490"/>
    <path d="M504,490 A28,18 0 0,0 560,490"/>
    <!-- Row 2 (offset) -->
    <path d="M252,520 A28,18 0 0,0 308,520"/>
    <path d="M308,520 A28,18 0 0,0 364,520"/>
    <path d="M364,520 A28,18 0 0,0 420,520"/>
    <path d="M420,520 A28,18 0 0,0 476,520"/>
    <path d="M476,520 A28,18 0 0,0 532,520"/>
    <path d="M532,520 A28,18 0 0,0 588,520"/>
    <!-- Row 3 -->
    <path d="M258,550 A28,18 0 0,0 314,550"/>
    <path d="M314,550 A28,18 0 0,0 370,550"/>
    <path d="M370,550 A28,18 0 0,0 426,550"/>
    <path d="M426,550 A28,18 0 0,0 482,550"/>
    <path d="M482,550 A28,18 0 0,0 538,550"/>
    <path d="M538,550 A28,18 0 0,0 572,550"/>
    <!-- Row 4 -->
    <path d="M268,580 A28,18 0 0,0 324,580"/>
    <path d="M324,580 A28,18 0 0,0 380,580"/>
    <path d="M380,580 A28,18 0 0,0 436,580"/>
    <path d="M436,580 A28,18 0 0,0 492,580"/>
    <path d="M492,580 A28,18 0 0,0 548,580"/>
    <!-- Row 5 -->
    <path d="M280,610 A28,18 0 0,0 336,610"/>
    <path d="M336,610 A28,18 0 0,0 392,610"/>
    <path d="M392,610 A28,18 0 0,0 448,610"/>
    <path d="M448,610 A28,18 0 0,0 504,610"/>
    <!-- Row 6 -->
    <path d="M292,640 A28,18 0 0,0 348,640"/>
    <path d="M348,640 A28,18 0 0,0 404,640"/>
    <path d="M404,640 A28,18 0 0,0 460,640"/>
    <path d="M460,640 A28,18 0 0,0 508,640"/>
  </g>

  <!-- ── Jaw ── -->
