<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="crest-title crest-desc">
  <title id="crest-title">House of Piranha — Coat of Arms</title>
  <desc id="crest-desc">A gold and obsidian heraldic crest with crown, piranha charge, scale texture, and motto banner.</desc>

  <rect width="900" height="1200" fill="#050505"/>

  <!-- ── Decorative outer rings ── -->
  <circle cx="450" cy="530" r="342" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.12"/>
  <circle cx="450" cy="530" r="326" fill="none" stroke="#D4AF37" stroke-width="0.75" opacity="0.07"/>

  <!-- ── Heraldic crown (above shield) ── -->
  <!-- Crown base band -->
  <path d="M298,188 L602,188 L602,228 L298,228 Z" fill="#D4AF37"/>
  <path d="M300,190 L600,190 L600,226 L300,226 Z" fill="#0d1010"/>
  <path d="M300,190 L600,190 L600,226 L300,226 Z" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.5"/>
  <!-- Crown points (5 peaks) -->
  <path d="M310,228 L310,170 L340,140 L370,170 L370,228" fill="#D4AF37"/>
  <path d="M380,228 L380,158 L420,118 L460,158 L460,228" fill="#D4AF37"/>
  <path d="M470,228 L470,158 L510,118 L550,158 L550,228" fill="#D4AF37"/>
  <path d="M560,228 L560,170 L590,140 L620,170 L620,228" fill="#D4AF37"/>
  <path d="M290,228 L290,175 L310,152 L330,175 L330,228" fill="#D4AF37"/>
  <!-- Crown jewels (dots on peaks) -->
  <circle cx="340" cy="138" r="7" fill="#D4AF37"/>
  <circle cx="460" cy="116" r="10" fill="#D4AF37"/>
  <circle cx="510" cy="116" r="10" fill="#D4AF37"/>
  <circle cx="590" cy="138" r="7" fill="#D4AF37"/>
  <circle cx="310" cy="150" r="5" fill="#D4AF37"/>
  <!-- Crown inner accent -->
  <rect x="302" y="194" width="296" height="28" rx="2" fill="none" stroke="rgba(212,175,55,0.4)" stroke-width="1"/>

  <!-- ── Main shield body ── -->
  <path d="M450 236 L790 360 V560 C790 810 660 1000 450 1090 C240 1000 110 810 110 560 V360 Z" fill="#101414" stroke="#D4AF37" stroke-width="14"/>

  <!-- Inner shield (first layer) -->
  <path d="M450 278 L752 390 V558 C752 778 636 952 450 1040 C264 952 148 778 148 558 V390 Z" fill="#090c0c" stroke="#5A171C" stroke-width="6"/>

  <!-- Inner shield (second layer — subtler) -->
  <path d="M450 312 L722 414 V558 C722 754 618 910 450 994 C282 910 178 754 178 558 V414 Z" fill="none" stroke="rgba(212,175,55,0.15)" stroke-width="2"/>

  <!-- ── Leather cross-hatch texture lines ── -->
  <g opacity="0.18" stroke="#F0C84A" stroke-width="1.5">
    <path d="M165 395 L735 395"/>
    <path d="M148 450 L752 450"/>
    <path d="M140 510 L760 510"/>
    <path d="M148 570 L752 570"/>
    <path d="M165 630 L735 630"/>
    <path d="M195 690 L705 690"/>
    <path d="M230 750 L670 750"/>
    <path d="M275 810 L625 810"/>
    <path d="M330 870 L570 870"/>
    <path d="M390 930 L510 930"/>
  </g>

