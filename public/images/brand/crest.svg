  <!-- Teeth (lower) -->
  <path d="M600,618 L610,648 L620,620 M620,620 L630,650 L638,622 M638,622 L648,652 L655,622"
    fill="none" stroke="#050505" stroke-width="3" stroke-linejoin="round"/>
  <!-- Mouth opening indicator -->
  <path d="M598,508 C630,530 648,560 598,618" fill="none" stroke="rgba(5,5,5,0.6)" stroke-width="6"/>

  <!-- ── Eye ── -->
  <circle cx="575" cy="455" r="22" fill="#050505"/>
  <circle cx="575" cy="455" r="16" fill="#1a1a1a"/>
  <circle cx="575" cy="455" r="10" fill="#050505"/>
  <circle cx="568" cy="448" r="4" fill="#D4AF37" opacity="0.9"/>

  <!-- ── Side scrollwork (flanking the shield) ── -->
  <!-- Left scroll -->
  <path d="M82,480 C56,500 44,540 56,580 C68,620 100,640 120,630 C140,620 148,595 136,575 C124,555 104,558 100,575 C96,592 106,602 118,598"
    fill="none" stroke="#D4AF37" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <path d="M82,480 C62,455 62,420 82,400 C102,380 130,380 140,400"
    fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
  <path d="M82,640 C58,660 52,700 68,730 C84,760 116,765 130,748"
    fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
  <!-- Right scroll (mirror) -->
  <path d="M818,480 C844,500 856,540 844,580 C832,620 800,640 780,630 C760,620 752,595 764,575 C776,555 796,558 800,575 C804,592 794,602 782,598"
    fill="none" stroke="#D4AF37" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <path d="M818,480 C838,455 838,420 818,400 C798,380 770,380 760,400"
    fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
  <path d="M818,640 C842,660 848,700 832,730 C816,760 784,765 770,748"
    fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.35" stroke-linecap="round"/>

  <!-- ── Motto banner ── -->
  <!-- Banner ribbon shape -->
  <path d="M170,1055 C170,1040 200,1030 230,1038 L450,1030 L670,1038 C700,1030 730,1040 730,1055 L720,1082 C720,1097 700,1106 670,1098 L450,1105 L230,1098 C200,1106 180,1097 180,1082 Z"
    fill="#0d1010" stroke="#D4AF37" stroke-width="2"/>
  <!-- Banner tail left -->
  <path d="M180,1082 L140,1100 L185,1070 Z" fill="#D4AF37" opacity="0.8"/>
  <!-- Banner tail right -->
  <path d="M720,1082 L760,1100 L715,1070 Z" fill="#D4AF37" opacity="0.8"/>
  <!-- Motto text -->
  <text x="450" y="1074" text-anchor="middle" fill="#D4AF37"
    font-family="Georgia, 'Playfair Display', serif"
    font-size="28" font-weight="400" letter-spacing="6">
    LUXURY THAT BITES BACK
  </text>

  <!-- ── Founding ornament ── -->
  <text x="450" y="1138" text-anchor="middle" fill="#D4AF37"
    font-family="Georgia, serif"
    font-size="18" font-weight="400" letter-spacing="8" opacity="0.6">
    EST. MMXXIV
  </text>
  <!-- Small divider ornament -->
  <path d="M340,1148 L410,1148 M490,1148 L560,1148" stroke="#D4AF37" stroke-width="1" opacity="0.4"/>
  <circle cx="450" cy="1148" r="3" fill="#D4AF37" opacity="0.5"/>
</svg>
