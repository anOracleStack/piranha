  <path d="M578,480 C605,476 640,468 660,455 C648,480 628,500 600,510 Z" fill="#D4AF37"/>
  <!-- Lower jaw extension (underbite) -->
  <path d="M580,574 C608,578 645,590 665,606 C648,620 624,626 598,618 Z" fill="#D4AF37"/>
