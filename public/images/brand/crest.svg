  <path d="
    M220,610
    C208,567 212,512 232,476
    C254,436 292,420 340,413
    C388,406 435,410 478,422
    C516,434 548,452 568,480
    C584,502 582,536 572,568
    C562,598 540,626 506,642
    C473,658 434,664 390,662
    C348,660 306,648 272,630
    C246,616 234,653 220,610 Z"
    fill="none"
    stroke="rgba(5,5,5,0.5)"
